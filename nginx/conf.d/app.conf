# ── Upstream Next.js (nom du service docker-compose) ─────────────────────────
upstream nextjs {
    server nextjs:3000;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name hub.nhesitepas.com burgerking.nhesitepas.com naga.nhesitepas.com;

    # Challenge Certbot pour renouvellement SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Hub OAuth ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name hub.nhesitepas.com;

    ssl_certificate     /etc/nginx/ssl/live/hub.nhesitepas.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/hub.nhesitepas.com/privkey.pem;
    include             /etc/nginx/ssl/options-ssl-nginx.conf;
    ssl_dhparam         /etc/nginx/ssl/ssl-dhparams.pem;

    # Headers de sécurité
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

