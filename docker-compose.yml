services:
  mongo:
    image: mongo:7
    container_name: 3gs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: 3gsolution
    # Accessible uniquement depuis le réseau Docker interne
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: ./3gsolutionapp
      dockerfile: Dockerfile.dev
    container_name: 3gs_nextjs
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:3008:3000"   # accessible uniquement depuis le host (nginx global)
    volumes:
      - ./3gsolutionapp:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://root:devpassword@mongo:27017/3gsolution?authSource=admin
      # NEXTAUTH_URL = domaine du hub (seul domaine enregistré dans Google Console)
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://hub.nhesitepas.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev_secret_change_in_prod}
      # Les vars SUPERADMIN sont déclarées ici (pas dans env_file) pour éviter que
      # Next.js les écrase via dotenv-expand au démarrage. Valeurs lues depuis le
      # fichier .env à la racine du projet (côté docker-compose).
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD_HASH=${SUPERADMIN_PASSWORD_HASH}
      - SUPERADMIN_JWT_SECRET=${SUPERADMIN_JWT_SECRET}
      # Auth Hub OAuth cross-domain (Sprint 19)
      - AUTH_HUB_URL=${AUTH_HUB_URL}
      - AUTH_HUB_HOST=${AUTH_HUB_HOST}
      - NEXT_PUBLIC_AUTH_HUB_URL=${NEXT_PUBLIC_AUTH_HUB_URL}
      - INTER_SERVICE_SECRET=${INTER_SERVICE_SECRET}
    env_file:
      - path: ./3gsolutionapp/.env.local
        required: false

  mongo-express:
    image: mongo-express:1
    container_name: 3gs_mongo_ui
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8081"   # local uniquement, accès via SSH tunnel
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:devpassword@mongo:27017/
      ME_CONFIG_BASICAUTH: false

  maildev:
    image: maildev/maildev
    container_name: 3gs_maildev
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"   # local uniquement
      - "127.0.0.1:1025:1025"   # SMTP local

volumes:
  mongo_data:
