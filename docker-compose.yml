services:
  mongo:
    image: mongo:7
    container_name: 3gs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: 3gsolution
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: ./3gsolutionapp
      dockerfile: Dockerfile.dev
    container_name: 3gs_nextjs
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3008:3000"
    volumes:
      - ./3gsolutionapp:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://root:devpassword@mongo:27017/3gsolution?authSource=admin
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev_secret_change_in_prod
    env_file:
      - path: ./3gsolutionapp/.env.local
        required: false

  mongo-express:
    image: mongo-express:1
    container_name: 3gs_mongo_ui
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:devpassword@mongo:27017/
      ME_CONFIG_BASICAUTH: false

volumes:
  mongo_data:
